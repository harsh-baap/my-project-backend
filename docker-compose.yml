version: '3.8'

services:
  # Python Flask Detection API
  detection-api:
    build: .
    container_name: safeguard-detection-api
    ports:
      - "5000:5000"
    environment:
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./DataModel:/app/DataModel
      - ./Data:/app/Data
    restart: unless-stopped
    networks:
      - safeguard-network

  # Node.js Express Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: safeguard-backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://admin:${MONGO_PASSWORD:-admin123}@mongo:27017/project?authSource=admin
      - SESSION_SECRET=${SESSION_SECRET:-your_session_secret_key}
      - PYTHON_API_URL=http://detection-api:5000
      - NODE_ENV=production
    depends_on:
      - detection-api
      - mongo
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./Data:/app/Data
    restart: unless-stopped
    networks:
      - safeguard-network

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: safeguard-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-admin123}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - safeguard-network

  # Frontend (Optional - for development)
  frontend:
    image: nginx:alpine
    container_name: safeguard-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - safeguard-network

networks:
  safeguard-network:
    driver: bridge

volumes:
  mongo-data:
